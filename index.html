        const IconWaves = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 6c.6 0 1.2-.2 1.7-.6l2-1.5c1-.8 2.4-.8 3.4 0l2 1.5c.5.4 1.1.6 1.7.6s1.2-.2 1.7-.6l2-1.5c1-.8 2.4-.8 3.4 0l2 1.5c.5.4 1.1.6 1.7.6"/><path d="M2 12c.6 0 1.2-.2 1.7-.6l2-1.5c1-.8 2.4-.8 3.4 0l2 1.5c.5.4 1.1.6 1.7.6s1.2-.2 1.7-.6l2-1.5c1-.8 2.4-.8 3.4 0l2 1.5c.5.4 1.1.6 1.7.6"/><path d="M2 18c.6 0 1.2-.2 1.7-.6l2-1.5c1-.8 2.4-.8 3.4 0l2 1.5c.5.4 1.1.6 1.7.6s1.2-.2 1.7-.6l2-1.5c1-.8 2.4-.8 3.4 0l2 1.5c.5.4 1.1.6 1.7.6"/></svg>;
        const IconCylinder = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/></svg>;
        const IconPrinter = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const IconInfo = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const IconClose = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconHome = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconFlame = ({ className = "w-full h-full" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
        const IconCopy = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const IconThermometer = ({ className = "w-full h-full" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" /></svg>;

        // ==========================================
        // COMPONENTE DATI PROGETTO (Condiviso)
        // ==========================================
        const ProjectHeader = ({ pData, setPData, title, setAppMode, iconColor = 'brand' }) => {
            const [logoError, setLogoError] = useState(false);
            const iconBg = iconColor === 'brand' ? 'bg-brand-600' : (iconColor === 'orange' ? 'bg-orange-600' : 'bg-red-600');
            return (
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 mb-6 print:shadow-none print:border-none print:p-0 print:mb-2">
                    <div className="flex justify-between items-center mb-6 print:hidden">
                        <button onClick={() => setAppMode('dashboard')} className="flex items-center text-slate-500 hover:text-brand-600 transition-colors text-sm font-medium">
                            <IconHome className="w-4 h-4 mr-1"/> Menu Principale
                        </button>
                        <button onClick={() => window.print()} className="flex items-center px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">
                            <IconPrinter className="w-4 h-4 mr-2"/> Stampa Report
                        </button>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 print:border-b-2 print:border-slate-800 print:pb-4 print:mb-4">
                        <div className="flex items-center space-x-4 flex-1 w-full">
                            {!logoError ? (
                                <img src="Logo.png" alt="Logo" className="h-12 w-auto object-contain print:h-12" onError={() => setLogoError(true)} />
                            ) : (
                                <div className={`${iconBg} p-2 rounded-lg print:bg-slate-800 w-10 h-10`}>
                                    <IconDroplets className="text-white" />
                                </div>
                            )}
                            <div className="flex-1">
                                <p className={`text-xs font-bold uppercase tracking-wider mb-1 print:text-slate-500 text-${iconColor}-600`}>{title}</p>
                                <input type="text" value={pData.client} onChange={e => setPData({...pData, client: e.target.value})} className={`text-2xl md:text-3xl font-bold text-slate-900 bg-transparent border-b border-transparent hover:border-slate-300 focus:outline-none w-full max-w-xl print:border-none print:p-0 focus:border-${iconColor}-500`} placeholder="Inserisci Titolo o Cliente..."/>
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 print:bg-transparent print:border-none print:p-0">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-2">
                            <div className="flex space-x-4">
                                <div className="flex-1">
                                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Progettista / Autore</label>
                                    <input type="text" value={pData.author} onChange={e => setPData({...pData, author: e.target.value})} placeholder="Tuo Nome..." className="w-full bg-transparent text-sm font-medium text-slate-700 focus:outline-none border-b border-slate-300 print:border-none" />
                                </div>
                                <div className="flex-1">
                                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Data</label>
                                    <input type="date" value={pData.date} onChange={e => setPData({...pData, date: e.target.value})} className="w-full bg-transparent text-sm font-medium text-slate-700 focus:outline-none border-b border-slate-300 print:border-none" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Note Tecniche</label>
                                <textarea rows="2" value={pData.notes} onChange={e => setPData({...pData, notes: e.target.value})} placeholder="Inserisci note sul progetto..." className="w-full bg-transparent text-sm text-slate-600 focus:outline-none border-b border-slate-300 resize-none print:border-none print:resize-none"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // APP 1: PROFILO IDRAULICO
        // ==========================================
        function ToolProfiloIdraulico({ projectData, setProjectData, setAppMode }) {
            const [flowRate, setFlowRate] = useState(25);
            const [recircFactor, setRecircFactor] = useState(1);
            const [referenceElevation, setReferenceElevation] = useState(0);
            const [waterTemp, setWaterTemp] = useState(15);
            const [altitude, setAltitude] = useState(0);
            const [displayUnit, setDisplayUnit] = useState('m'); 
            const [elements, setElements] = useState([]);

            const profile = useMemo(() => {
                let currentElevation = Number(referenceElevation) || 0;
                const Q_m3s = ((Number(flowRate) || 0) * (Number(recircFactor) || 0)) / 3600;
                const currentTemp = Number(waterTemp) || 15;
                const g = 9.80665 - (0.00000328 * (Number(altitude) || 0));

                return elements.map((el) => {
                    let headLoss = 0;
                    if (el.type === 'weir') {
                        if (Q_m3s > 0 && el.L > 0) {
                            if (el.weirType === 'thompson') headLoss = Math.pow(Q_m3s / ((8/15) * 0.62 * Math.sqrt(2 * g)), 2/5); 
                            else headLoss = Math.pow(Q_m3s / ((el.weirType === 'sottile' ? 0.54 : 0.384) * el.L * Math.sqrt(2 * g)), 2 / 3);
                        }
                    } else if (el.type === 'pipe') {
                        const totalK = el.localLosses ? el.localLosses.reduce((sum, loss) => sum + (Number(loss.val) || 0), 0) : 0;
                        if (Q_m3s > 0 && el.D > 0) {
                            const D = el.D / 1000;
                            const v = Q_m3s / (Math.PI * Math.pow(D / 2, 2));
                            const nu = (1.78 / (1 + 0.0337 * currentTemp + 0.000221 * Math.pow(currentTemp, 2))) * 1e-6;
                            const Re = (v * D) / nu;
                            let f = 0.02;
                            if (Re > 4000) f = 0.25 / Math.pow(Math.log10((el.roughness/1000) / (3.7 * D) + 5.74 / Math.pow(Re, 0.9)), 2);
                            else if (Re > 0) f = 64 / Re;
                            headLoss = (f * (el.L / D) + totalK) * ((v * v) / (2 * g));
                        }
                    } else if (el.type === 'channel') headLoss = el.L * el.slope;
                    else if (el.type === 'custom') headLoss = Number(el.loss) || 0;

                    currentElevation += headLoss;
                    return { ...el, headLoss, elevation: currentElevation, totalKCalculated: el.type === 'pipe' ? (el.localLosses ? el.localLosses.reduce((sum, l) => sum + (Number(l.val) || 0), 0) : 0) : 0 };
                });
            }, [elements, flowRate, recircFactor, referenceElevation, waterTemp, altitude]);

            const addElement = (type) => {
                const newId = elements.length > 0 ? Math.max(...elements.map(e => e.id)) + 1 : 1;
                let newEl = { id: newId, type, name: type === 'weir' ? 'Stramazzo (Sottile)' : type === 'pipe' ? 'Tubazione' : type === 'channel' ? 'Canale' : 'Perdita Fissa' };
                if (type === 'weir') newEl = { ...newEl, L: 1.0, weirType: 'sottile' };
                if (type === 'pipe') newEl = { ...newEl, L: 10, material: 'manuale', D: 200, roughness: 0.02, localLosses: [] };
                if (type === 'channel') newEl = { ...newEl, L: 5, slope: 0.005 };
                if (type === 'custom') newEl = { ...newEl, loss: 0.05 };
                setElements([...elements, newEl]);
            };

            const updateElement = (id, field, value) => {
                setElements(prev => prev.map(e => {
                    if (e.id === id) {
                        let updated = { ...e, [field]: value };
                        if (field === 'weirType' && updated.name.startsWith('Stramazzo')) {
                            updated.name = `Stramazzo (${value === 'thompson' ? 'Thompson' : value === 'sottile' ? 'Parete Sottile' : 'Parete Spessa'})`;
                        }
                        if (e.type === 'pipe') {
                            if (field === 'material' && value !== 'manuale') {
                                const matData = PIPE_CATALOG[value];
                                const firstDN = Object.keys(matData.specs)[0];
                                const firstPN = Object.keys(matData.specs[firstDN])[0];
                                updated.DN = firstDN; updated.PN = firstPN; updated.roughness = matData.roughness; updated.D = matData.specs[firstDN][firstPN]; updated.name = `Tubo ${value} DN${firstDN}`;
                            } else if (field === 'DN' && updated.material !== 'manuale') {
                                let pn = updated.PN;
                                if (!PIPE_CATALOG[updated.material].specs[value][pn]) pn = Object.keys(PIPE_CATALOG[updated.material].specs[value])[0]; 
                                updated.PN = pn; updated.D = PIPE_CATALOG[updated.material].specs[value][pn]; updated.name = `Tubo ${updated.material} DN${value}`;
                            } else if (field === 'PN' && updated.material !== 'manuale') {
                                updated.D = PIPE_CATALOG[updated.material].specs[updated.DN][value];
                            }
                        }
                        return updated;
                    }
                    return e;
                }));
            };

            const handleLocalLoss = (pipeId, action, lossId, field, value) => {
                setElements(prev => prev.map(e => {
                    if (e.id === pipeId) {
                        let newLosses = e.localLosses || [];
                        if (action === 'add') newLosses = [...newLosses, { id: Date.now(), type: 'manuale', val: 0.5 }];
                        else if (action === 'remove') newLosses = newLosses.filter(l => l.id !== lossId);
                        else if (action === 'update') {
                            newLosses = newLosses.map(l => {
                                if (l.id === lossId) {
                                    let up = { ...l, [field]: value };
                                    if (field === 'type' && value !== 'manuale') up.val = Number(value);
                                    if (field === 'val') up.type = 'manuale';
                                    return up;
                                }
                                return l;
                            });
                        }
                        return { ...e, localLosses: newLosses };
                    }
                    return e;
                }));
            }

            const moveEl = (idx, dir) => {
                if ((idx === 0 && dir === -1) || (idx === elements.length - 1 && dir === 1)) return;
                const newEl = [...elements];
                [newEl[idx], newEl[idx + dir]] = [newEl[idx + dir], newEl[idx]];
                setElements(newEl);
            };

            const ChartIdraulico = ({ profileData, baseElev }) => {
                const chartRef = useRef(null), chartInst = useRef(null);
                useEffect(() => {
                    if (chartInst.current) chartInst.current.destroy();
                    if (!chartRef.current || profileData.length === 0) return;
                    const reversed = [...profileData].reverse();
                    let labels = ['Vasca (Monte)'], data = [reversed.length > 0 ? reversed[0].elevation : baseElev];
                    reversed.forEach((el, i) => { labels.push(el.name); data.push(i < reversed.length - 1 ? reversed[i + 1].elevation : baseElev); });
                    chartInst.current = new Chart(chartRef.current.getContext('2d'), {
                        type: 'line',
                        data: { labels, datasets: [{ label: 'Quota (m)', data, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, stepped: 'before', fill: true, pointRadius: 4 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { suggestedMin: baseElev - 0.5, suggestedMax: data[0] + 0.5 }, x: { display: false } } }
                    });
                }, [profileData, baseElev]);
                return <div className="w-full h-64 mt-4 bg-white border border-slate-200 rounded-lg p-2 print:border-none print:h-48 print-page-break">{profileData.length > 0 ? <canvas ref={chartRef}></canvas> : <div className="h-full flex items-center justify-center text-slate-400">Aggiungi elementi</div>}</div>;
            };

            const format = (v) => displayUnit === 'cm' ? (Number(v)*100).toFixed(1) + ' cm' : Number(v).toFixed(3) + ' m';
            const toU = (v) => displayUnit === 'cm' ? +(Number(v)*100).toFixed(4) : v;
            const frmU = (v) => displayUnit === 'cm' ? Number(v)/100 : Number(v);

            return (
                <div className="max-w-6xl mx-auto">
                    <ProjectHeader pData={projectData} setPData={setProjectData} title="Profilo Idraulico" setAppMode={setAppMode} iconColor="brand" />
                    
                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 mb-6 print:shadow-none print:border-none print:p-0">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-sm font-bold text-slate-700">Dati Idraulici Base</h3>
                            <div className="print-hide flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                <button onClick={() => setDisplayUnit('m')} className={`px-2 py-1 rounded text-xs font-bold ${displayUnit === 'm' ? 'bg-white shadow-sm text-brand-600' : 'text-slate-500'}`}>m</button>
                                <button onClick={() => setDisplayUnit('cm')} className={`px-2 py-1 rounded text-xs font-bold ${displayUnit === 'cm' ? 'bg-white shadow-sm text-brand-600' : 'text-slate-500'}`}>cm</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 print:grid-cols-5 print:gap-2">
                            {[{l: 'Portata Base (m³/h)', v: flowRate, set: setFlowRate}, {l: 'Ricircolo Fanghi', v: recircFactor, set: setRecircFactor, sub: `Q. Calc: ${(flowRate*recircFactor).toFixed(1)} m³/h`}, {l: 'Temp. Acqua (°C)', v: waterTemp, set: setWaterTemp}, {l: 'Altitudine (m s.l.m.)', v: altitude, set: setAltitude}].map((f, i) => (
                                <div key={i} className="bg-slate-50 p-3 rounded-lg border border-slate-200 print:bg-transparent print:border-none print:p-0">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">{f.l}</label>
                                    <input type="number" step={f.l.includes('Ricircolo') ? "0.1" : "1"} value={f.v} onChange={e => f.set(e.target.value === '' ? '' : Number(e.target.value))} className="w-full bg-transparent text-lg font-semibold text-slate-800 focus:outline-none print:text-base border-b border-slate-300 print:border-none focus:border-brand-500" />
                                    {f.sub && <p className="text-[9px] text-slate-400 mt-1">{f.sub}</p>}
                                </div>
                            ))}
                            <div className="bg-brand-50 p-3 rounded-lg border border-brand-200 print:bg-transparent print:border-none print:p-0">
                                <label className="block text-[10px] font-bold text-brand-600 uppercase mb-1">Quota a Valle ({displayUnit})</label>
                                <input type="number" step={displayUnit==='cm'?"1":"0.01"} value={toU(referenceElevation)} onChange={e => setReferenceElevation(frmU(e.target.value))} className="w-full bg-transparent text-lg font-bold text-brand-800 focus:outline-none print:text-base border-b border-brand-300 print:border-none focus:border-brand-600" />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 print:block">
                        <div className="lg:col-span-2 space-y-4 print-hide">
                            <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-xl shadow-sm"><h2 className="font-semibold text-sm flex items-center"><IconArrowUp className="w-4 h-4 mr-2"/> Costruzione (da Valle a Monte)</h2></div>
                            {elements.length === 0 && <div className="bg-white p-8 rounded-xl border-2 border-dashed border-slate-300 text-center text-slate-500 text-sm">Nessun elemento presente.</div>}
                            
                            {elements.map((el, i) => (
                                <div key={el.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                    <div className="flex justify-between items-start mb-3">
                                        <div className="flex items-center space-x-2 w-full text-brand-600">
                                            <div className="w-5 h-5 shrink-0">{el.type === 'weir' ? <IconWaves/> : el.type === 'pipe' ? <IconCylinder/> : el.type === 'channel' ? <div className="w-full h-full border-b-2 border-r-2 border-current transform -skew-x-12"></div> : <IconPlus/>}</div>
                                            <input type="text" value={el.name} onChange={e => updateElement(el.id, 'name', e.target.value)} className="font-bold text-slate-800 bg-transparent outline-none w-full border-b border-transparent hover:border-slate-300 focus:border-brand-500" />
                                        </div>
                                        <div className="flex space-x-1 shrink-0">
                                            <button onClick={()=>moveEl(i,-1)} className="p-1 text-slate-400 hover:bg-slate-100 rounded">↑</button>
                                            <button onClick={()=>moveEl(i,1)} className="p-1 text-slate-400 hover:bg-slate-100 rounded">↓</button>
                                            <button onClick={()=>setElements(elements.filter(x=>x.id!==el.id))} className="p-1 text-red-400 hover:bg-red-500 hover:text-white rounded"><IconTrash className="w-4 h-4"/></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        {el.type === 'weir' && (
                                            <>
                                                <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipo Parete</label><select value={el.weirType} onChange={e => updateElement(el.id, 'weirType', e.target.value)} className="w-full p-1 bg-slate-50 border border-slate-200 rounded text-sm outline-none"><option value="sottile">Sottile</option><option value="spessa">Spessa</option><option value="thompson">Thompson (A "V")</option></select></div>
                                                {el.weirType !== 'thompson' && <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Larghezza ({displayUnit})</label><input type="number" step={displayUnit==='cm'?"1":"0.1"} value={toU(el.L)} onChange={e => updateElement(el.id, 'L', frmU(e.target.value))} className="w-full p-1 bg-slate-50 border border-slate-200 rounded text-sm outline-none"/></div>}
                                            </>
                                        )}
                                        {el.type === 'pipe' && (
                                            <div className="col-span-2 md:col-span-4 bg-slate-50 p-2 rounded border border-slate-100 space-y-2">
                                                <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
                                                    <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Lunghezza ({displayUnit})</label><input type="number" step={displayUnit==='cm'?"1":"0.5"} value={toU(el.L)} onChange={e => updateElement(el.id, 'L', frmU(e.target.value))} className="w-full p-1 bg-white border border-slate-300 rounded text-sm outline-none"/></div>
                                                    <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Materiale</label><select value={el.material} onChange={e => updateElement(el.id, 'material', e.target.value)} className="w-full p-1 bg-white border border-slate-300 rounded text-sm outline-none"><option value="manuale">Manuale...</option>{Object.keys(PIPE_CATALOG).map(m=><option key={m} value={m}>{m}</option>)}</select></div>
                                                    {el.material !== 'manuale' ? (
                                                        <>
                                                            <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">DN</label><select value={el.DN} onChange={e => updateElement(el.id, 'DN', e.target.value)} className="w-full p-1 bg-white border border-slate-300 rounded text-sm outline-none">{Object.keys(PIPE_CATALOG[el.material].specs).map(dn=><option key={dn} value={dn}>{dn}</option>)}</select></div>

                                                            <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Scabrezza</label><input type="number" step="0.01" value={el.roughness} onChange={e => updateElement(el.id, 'roughness', e.target.value === '' ? '' : Number(e.target.value))} className="w-full p-1 bg-white border border-slate-300 rounded text-sm outline-none"/></div>

                                                                <input type="number" step="0.1" value={l.val} onChange={e=>handleLocalLoss(el.id,'update',l.id,'val',e.target.value===''?'' : Number(e.target.value))} className="w-12 p-1 text-center outline-none"/>
                                                                <button onClick={()=>handleLocalLoss(el.id,'remove',l.id)} className="p-1 text-slate-400 hover:text-red-500"><IconClose className="w-3 h-3"/></button>
                                                            </div>

                                                </div>
                                            </div>

                                        {el.type === 'channel' && (
                                            <>

                                                <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Pendenza</label><input type="number" step="0.001" value={el.slope} onChange={e => updateElement(el.id, 'slope', e.target.value===''?'' : Number(e.target.value))} className="w-full p-1 bg-slate-50 border border-slate-200 rounded text-sm outline-none"/></div>

                                        {el.type === 'custom' && <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Perdita ({displayUnit})</label><input type="number" step={displayUnit==='cm'?"1":"0.01"} value={toU(el.loss)} onChange={e => updateElement(el.id, 'loss', frmU(e.target.value))} className="w-full p-1 bg-slate-50 border border-slate-200 rounded text-sm outline-none"/></div>}
                                    </div>
                                </div>
                            ))}
                            <div className="flex flex-wrap gap-2 pt-2">
                                <button onClick={()=>addElement('weir')} className="px-3 py-1.5 bg-blue-100 text-blue-700 rounded text-sm font-bold shadow-sm flex items-center"><IconPlus className="w-3 h-3 mr-1"/> Stramazzo</button>
                                <button onClick={()=>addElement('pipe')} className="px-3 py-1.5 bg-slate-200 text-slate-700 rounded text-sm font-bold shadow-sm flex items-center"><IconPlus className="w-3 h-3 mr-1"/> Tubo</button>
                                <button onClick={()=>addElement('channel')} className="px-3 py-1.5 bg-teal-100 text-teal-700 rounded text-sm font-bold shadow-sm flex items-center"><IconPlus className="w-3 h-3 mr-1"/> Canale</button>
                                <button onClick={()=>addElement('custom')} className="px-3 py-1.5 bg-orange-100 text-orange-700 rounded text-sm font-bold shadow-sm flex items-center"><IconPlus className="w-3 h-3 mr-1"/> Perdita Fissa</button>
                            </div>
                        </div>

                        <div className="lg:col-span-1 print-full-width">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 sticky top-6 print:shadow-none print:border-none print:p-0">
                                <div className="p-4 print:p-0">
                                    <h3 className="text-sm font-bold text-slate-800 mb-3 border-b border-slate-200 pb-2 print:border-slate-800 print:mb-2">Riepilogo Profilo</h3>

                                        <div className="flex justify-between text-xs font-semibold text-slate-500 pb-1 border-b border-dashed border-slate-200 print:border-none print:pb-0"><span>Partenza (Valle)</span><span className="font-mono">{format(referenceElevation)}</span></div>

        // ==========================================
        // APP 2: CARICHI TERMICI 
        // ==========================================
        function ToolCarichiTermici({ projectData, setProjectData, setAppMode }) {
            const [cp, setCp] = useState(4.187); // kJ/kg°C
            const [rho, setRho] = useState(1000); // kg/m³
            const [deltaT, setDeltaT] = useState(5); // °C
            const [vTarget, setVTarget] = useState(1.0); // m/s
            
            const [loads, setLoads] = useState([]);

            const processedLoads = useMemo(() => {
                return loads.map(load => {
                    let calcPower_kW = 0, calcFlow_m3h = 0, calcFlow_kgh = 0;
                    
                    if (load.mode === 'power') {
                        calcPower_kW = Number(load.inputVal) || 0;
                        calcFlow_kgh = (calcPower_kW * 3600) / (cp * deltaT);
                        calcFlow_m3h = calcFlow_kgh / rho;
                    } else {
                        calcFlow_m3h = Number(load.inputVal) || 0;
                        calcFlow_kgh = calcFlow_m3h * rho;
                        calcPower_kW = (calcFlow_kgh * cp * deltaT) / 3600;
                    }

                    const flow_m3s = calcFlow_m3h / 3600;
                    const area_m2 = flow_m3s / vTarget;
                    const d_teorico_mm = Math.sqrt((4 * area_m2) / Math.PI) * 1000;
                    
                    let realD = null, realVelocity = 0;

                    if (load.material && load.DN && load.PN) {
                        if (PIPE_CATALOG[load.material] && PIPE_CATALOG[load.material].specs[load.DN] && PIPE_CATALOG[load.material].specs[load.DN][load.PN]) {
                            realD = PIPE_CATALOG[load.material].specs[load.DN][load.PN];
                        }
                        if (realD) {
                            const realArea = Math.PI * Math.pow(realD / 2000, 2);
                            realVelocity = flow_m3s / realArea;
                        }
                    }

                    return { ...load, calcPower_kW, calcFlow_m3h, calcFlow_kgh, d_teorico_mm, realD, realVelocity };
                });
            }, [loads, cp, rho, deltaT, vTarget]);

            const addLoad = () => {
                const newId = loads.length > 0 ? Math.max(...loads.map(l => l.id)) + 1 : 1;
                setLoads([...loads, { id: newId, name: `Utenza ${newId}`, mode: 'power', inputVal: 300, material: 'Acciaio', DN: '50', PN: 'NORM' }]);
            };

            const duplicateLoad = (id) => {
                const loadToCopy = loads.find(l => l.id === id);
                if (!loadToCopy) return;
                const newId = loads.length > 0 ? Math.max(...loads.map(l => l.id)) + 1 : 1;
                setLoads([...loads, { ...loadToCopy, id: newId, name: loadToCopy.name + " (Copia)" }]);
            };

            const updateLoad = (id, field, val) => {
                setLoads(prev => prev.map(l => {
                    if (l.id === id) {
                        let updated = { ...l, [field]: val };
                        
                        if (field === 'material') {
                            const matData = PIPE_CATALOG[val];
                            const firstDN = Object.keys(matData.specs)[0];
                            const firstPN = Object.keys(matData.specs[firstDN])[0];
                            updated.DN = firstDN; updated.PN = firstPN;
                        } 
                        else if (field === 'DN') {
                            let currentPN = updated.PN;
                            if (!PIPE_CATALOG[updated.material].specs[val][currentPN]) {
                                currentPN = Object.keys(PIPE_CATALOG[updated.material].specs[val])[0];
                            }
                            updated.PN = currentPN;
                        }
                        return updated;
                    }
                    return l;
                }));
            };

            const removeLoad = (id) => setLoads(loads.filter(l => l.id !== id));

            const totalKW = processedLoads.reduce((s, l) => s + l.calcPower_kW, 0);
            const totalM3H = processedLoads.reduce((s, l) => s + l.calcFlow_m3h, 0);

            return (
                <div className="max-w-6xl mx-auto">
                    <ProjectHeader pData={projectData} setPData={setProjectData} title="Calcolo Carichi Termici & Reti" setAppMode={setAppMode} iconColor="orange" />
                    
                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 mb-6 print:shadow-none print:border-none print:p-0">
                        <h3 className="text-sm font-bold text-slate-700 mb-4 print:border-b print:border-slate-800 print:pb-1">Parametri Acqua / Fluido Termovettore</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 print:gap-2">
                            {[{l: 'Calore Specifico (kJ/kg°C)', v: cp, set: setCp, step: "0.001"}, {l: 'Densità (kg/m³)', v: rho, set: setRho, step: "1"}, {l: '∆T Dimensionamento (°C)', v: deltaT, set: setDeltaT, step: "1"}, {l: 'Velocità Target Tubi (m/s)', v: vTarget, set: setVTarget, step: "0.1"}].map((f, i) => (
                                <div key={i} className="bg-slate-50 p-3 rounded-lg border border-slate-200 print:bg-transparent print:border-none print:p-0">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">{f.l}</label>
                                    <input type="number" step={f.step} value={f.v} onChange={e => f.set(e.target.value === '' ? '' : Number(e.target.value))} className="w-full bg-transparent text-lg font-semibold text-slate-800 focus:outline-none print:text-base border-b border-slate-300 print:border-none focus:border-orange-500" />
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-4 print-hide">
                        <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-xl shadow-sm">
                            <h2 className="font-semibold text-sm flex items-center"><IconFlame className="w-4 h-4 mr-2"/> Utenze Termiche / Frigorifere</h2>
                        </div>
                        {processedLoads.length === 0 && <div className="bg-white p-8 rounded-xl border-2 border-dashed border-slate-300 text-center text-slate-500 text-sm">Nessuna utenza presente. Clicca su Aggiungi.</div>}
                        
                        {processedLoads.map((load, i) => (
                            <div key={load.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4">
                                
                                <div className="flex-1 space-y-3 pr-4 border-r border-slate-100">
                                    <div className="flex items-center justify-between">
                                        <input type="text" value={load.name} onChange={e => updateLoad(load.id, 'name', e.target.value)} className="font-bold text-lg text-slate-800 bg-transparent outline-none w-full border-b border-transparent hover:border-slate-300 focus:border-orange-500" placeholder="Nome Utenza" />
                                        <div className="flex ml-2">
                                            <button onClick={()=>duplicateLoad(load.id)} className="p-1 text-slate-400 hover:bg-slate-100 hover:text-orange-600 rounded shrink-0 mr-1" title="Duplica"><IconCopy className="w-4 h-4"/></button>
                                            <button onClick={()=>removeLoad(load.id)} className="p-1 text-red-400 hover:bg-red-500 hover:text-white rounded shrink-0" title="Elimina"><IconTrash className="w-4 h-4"/></button>
                                        </div>
                                    </div>
                                    <div className="flex items-center bg-slate-100 p-1 rounded">
                                        <button onClick={()=>updateLoad(load.id,'mode','power')} className={`flex-1 text-xs font-bold py-1.5 rounded ${load.mode==='power'?'bg-white shadow text-orange-600':'text-slate-500'}`}>So i kWt</button>
                                        <button onClick={()=>updateLoad(load.id,'mode','flow')} className={`flex-1 text-xs font-bold py-1.5 rounded ${load.mode==='flow'?'bg-white shadow text-orange-600':'text-slate-500'}`}>So la Portata</button>
                                    </div>
                                    <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Dato Noto ({load.mode === 'power' ? 'kW termici' : 'm³/h'})</label>
                                        <input type="number" step="0.1" value={load.inputVal} onChange={e => updateLoad(load.id, 'inputVal', e.target.value===''?'' : Number(e.target.value))} className="w-full text-xl font-bold bg-transparent outline-none border-b border-slate-300 focus:border-orange-500"/>
                                    </div>
                                </div>

                                <div className="flex-1 space-y-3 px-2">
                                    <h4 className="text-[11px] font-bold text-slate-400 uppercase">Risultato Conversione</h4>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-orange-50 p-2 rounded border border-orange-100">
                                            <p className="text-[10px] font-bold text-orange-600 uppercase">Portata (m³/h)</p>
                                            <p className="font-mono font-bold text-orange-800">{load.calcFlow_m3h.toFixed(2)}</p>
                                        </div>
                                        <div className="bg-orange-50 p-2 rounded border border-orange-100">
                                            <p className="text-[10px] font-bold text-orange-600 uppercase">Potenza (kWt)</p>
                                            <p className="font-mono font-bold text-orange-800">{load.calcPower_kW.toFixed(1)}</p>
                                        </div>
                                        <div className="bg-slate-50 p-2 rounded border border-slate-100 col-span-2">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase">Portata Massica (kg/h)</p>
                                            <p className="font-mono font-bold text-slate-700">{load.calcFlow_kgh.toFixed(1)}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-1 space-y-3 pl-4 border-l border-slate-100">
                                    <div className="flex justify-between items-center"><h4 className="text-[11px] font-bold text-slate-400 uppercase">Selezione Tubazione</h4><span className="text-[10px] text-slate-400">Ø Teorico: {load.d_teorico_mm?.toFixed(1)} mm</span></div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="col-span-3">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Materiale</label>
                                            <select value={load.material} onChange={e => updateLoad(load.id, 'material', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50">
                                                {Object.keys(PIPE_CATALOG).map(m=><option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div className="col-span-1">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">DN</label>
                                            <select value={load.DN} onChange={e => updateLoad(load.id, 'DN', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50">
                                                {Object.keys(PIPE_CATALOG[load.material].specs).map(dn=><option key={dn} value={dn}>{dn}</option>)}
                                            </select>
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Classe</label>
                                            <select value={load.PN} onChange={e => updateLoad(load.id, 'PN', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50">
                                                {Object.keys(PIPE_CATALOG[load.material].specs[load.DN]||{}).map(pn=><option key={pn} value={pn}>{pn}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className={`p-2 rounded border ${load.realVelocity <= vTarget + 0.2 && load.realVelocity >= vTarget - 0.5 ? 'bg-green-50 border-green-200' : 'bg-slate-50 border-slate-200'}`}>
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-500 uppercase">Tubo Selezionato</p>
                                                <p className="font-bold text-orange-800 text-lg">DN {load.DN}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] text-slate-500">Int: {load.realD?.toFixed(1)} mm</p>
                                                <p className={`text-xs font-bold ${load.realVelocity > vTarget * 1.5 ? 'text-red-600' : 'text-orange-600'}`}>v = {load.realVelocity.toFixed(2)} m/s</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        
                        <button onClick={addLoad} className="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold shadow-sm flex items-center hover:bg-slate-700"><IconPlus className="w-4 h-4 mr-2"/> Aggiungi Utenza</button>
                    </div>

                    <div className="hidden print:block mt-6">
                        <h3 className="text-sm font-bold text-slate-800 mb-2 border-b-2 border-slate-800 pb-1">Distinta Utenze e Dimensionamento Tubazioni</h3>
                        <table className="w-full text-left border-collapse text-xs mt-2">
                            <thead>
                                <tr className="border-b border-slate-300">
                                    <th className="py-2">Utenza</th>
                                    <th className="py-2">Potenza (kWt)</th>
                                    <th className="py-2">Portata (m³/h)</th>
                                    <th className="py-2">Mat. Tubo</th>
                                    <th className="py-2">DN / PN Selez.</th>
                                    <th className="py-2 text-right">Velocità (m/s)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {processedLoads.map(l => (
                                    <tr key={l.id} className="border-b border-slate-100">
                                        <td className="py-1 font-bold">{l.name}</td>
                                        <td className="py-1 font-mono">{l.calcPower_kW.toFixed(1)}</td>
                                        <td className="py-1 font-mono">{l.calcFlow_m3h.toFixed(2)}</td>
                                        <td className="py-1">{l.material}</td>
                                        <td className="py-1 font-bold">DN {l.DN} - {l.PN}</td>
                                        <td className="py-1 text-right font-mono">{l.realVelocity.toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        
                        <div className="flex gap-4 mt-8 mx-auto max-w-lg">
                            <div className="flex-1 p-3 rounded-lg border-2 border-slate-800 text-center">
                                <p className="text-[10px] font-bold uppercase text-slate-600 mb-1">Totale Potenza Termica</p>
                                <p className="text-2xl font-mono font-black">{totalKW.toFixed(1)} kW</p>
                            </div>
                            <div className="flex-1 p-3 rounded-lg border-2 border-slate-800 text-center">
                                <p className="text-[10px] font-bold uppercase text-slate-600 mb-1">Totale Portata Flusso</p>
                                <p className="text-2xl font-mono font-black">{totalM3H.toFixed(1)} m³/h</p>
                            </div>
                        </div>
                    </div>

                    <div className="mt-6 bg-slate-800 text-white p-4 rounded-xl flex justify-around items-center print-hide shadow-lg">
                        <div className="text-center">
                            <p className="text-xs text-slate-300 uppercase font-bold tracking-wide">Potenza Totale Rete</p>
                            <p className="text-2xl font-mono font-black">{totalKW.toFixed(1)} <span className="text-sm font-sans font-normal">kWt</span></p>
                        </div>
                        <div className="w-px h-10 bg-slate-600"></div>
                        <div className="text-center">
                            <p className="text-xs text-slate-300 uppercase font-bold tracking-wide">Portata Totale Rete</p>
                            <p className="text-2xl font-mono font-black">{totalM3H.toFixed(1)} <span className="text-sm font-sans font-normal">m³/h</span></p>
                        </div>
                    </div>

                </div>
            );
        }

        // ==========================================
        // APP 3: DISPERSIONE TERMIICA (NUOVO)
        // ==========================================
        function ToolDispersione({ projectData, setProjectData, setAppMode }) {
            const [tAmbGlobal, setTAmbGlobal] = useState(-5); // °C
            const [tFluidGlobal, setTFluidGlobal] = useState(55); // °C
            const [alphaInt, setAlphaInt] = useState(1163); // W/m2K (ex 1000 kcal/hm2°C)
            const [alphaExt, setAlphaExt] = useState(7.4); // W/m2K (ex 6.4 kcal/hm2°C)
            const [showAdvanced, setShowAdvanced] = useState(false);

            const [lines, setLines] = useState([]);

            const processedLines = useMemo(() => {
                return lines.map(line => {
                    let calcQ_Wm = 0;
                    let t_surf = 0;
                    let d_ext_m = 0;
                    let d_int_m = 0;

                    // Validazione base
                    if (line.material && line.DN && line.PN && PIPE_CATALOG[line.material] && PIPE_CATALOG[line.material].specs[line.DN]) {
                        const d_int_mm = PIPE_CATALOG[line.material].specs[line.DN][line.PN];
                        if (d_int_mm) {
                            d_int_m = d_int_mm / 1000;
                            d_ext_m = getExternalDiameter(line.material, line.DN, d_int_mm) / 1000;
                            
                            const lambda_pipe = PIPE_CATALOG[line.material].lambda;
                            const lambda_iso = line.isoLambda;
                            const s_m = line.isoThick / 1000;
                            const d_iso_m = d_ext_m + 2 * s_m;

                            // Calcolo Resistenze Termiche [m·K/W]
                            const R_int = 1 / (alphaInt * d_int_m);
                            const R_pipe = Math.log(d_ext_m / d_int_m) / (2 * lambda_pipe);
                            let R_iso = 0;
                            if (s_m > 0 && lambda_iso > 0) {
                                R_iso = Math.log(d_iso_m / d_ext_m) / (2 * lambda_iso);
                            }
                            const R_ext = 1 / (alphaExt * d_iso_m);

                            const R_tot = R_int + R_pipe + R_iso + R_ext;
                            const deltaT = Math.abs(tFluidGlobal - tAmbGlobal); // Manteniamo la dispersione in valore assoluto (positiva)
                            
                            // Dispersione W/m = (PI * deltaT) / R_tot
                            calcQ_Wm = (Math.PI * deltaT) / R_tot;
                            
                            // Temp superficie esterna
                            if (tFluidGlobal > tAmbGlobal) {
                                t_surf = tAmbGlobal + calcQ_Wm / (Math.PI * alphaExt * d_iso_m);
                            } else {
                                t_surf = tAmbGlobal - calcQ_Wm / (Math.PI * alphaExt * d_iso_m); // Se l'acqua è refrigerata
                            }
                        }
                    }

                    const calcQ_tot_kW = (calcQ_Wm * line.length) / 1000;

                    return { ...line, calcQ_Wm, calcQ_tot_kW, t_surf, d_ext_mm: d_ext_m*1000 };
                });
            }, [lines, tAmbGlobal, tFluidGlobal, alphaInt, alphaExt]);

            const addLine = () => {
                const newId = lines.length > 0 ? Math.max(...lines.map(l => l.id)) + 1 : 1;
                setLines([...lines, { id: newId, name: `Tratto ${newId}`, length: 100, material: 'Acciaio', DN: '100', PN: 'NORM', isoType: 'pur', isoLambda: 0.025, isoThick: 60 }]);
            };

            const duplicateLine = (id) => {
                const lineToCopy = lines.find(l => l.id === id);
                if (!lineToCopy) return;
                const newId = lines.length > 0 ? Math.max(...lines.map(l => l.id)) + 1 : 1;
                setLines([...lines, { ...lineToCopy, id: newId, name: lineToCopy.name + " (Copia)" }]);
            };

            const updateLine = (id, field, val) => {
                setLines(prev => prev.map(l => {
                    if (l.id === id) {
                        let updated = { ...l, [field]: val };
                        
                        if (field === 'material') {
                            const firstDN = Object.keys(PIPE_CATALOG[val].specs)[0];
                            const firstPN = Object.keys(PIPE_CATALOG[val].specs[firstDN])[0];
                            updated.DN = firstDN; updated.PN = firstPN;
                        } 
                        else if (field === 'DN') {
                            let currentPN = updated.PN;
                            if (!PIPE_CATALOG[updated.material].specs[val][currentPN]) {
                                currentPN = Object.keys(PIPE_CATALOG[updated.material].specs[val])[0];
                            }
                            updated.PN = currentPN;
                        }
                        else if (field === 'isoType') {
                            const isoDef = INSULATION_CATALOG.find(i => i.id === val);
                            if (isoDef) updated.isoLambda = isoDef.lambda;
                        }
                        return updated;
                    }
                    return l;
                }));
            };

            const removeLine = (id) => setLines(lines.filter(l => l.id !== id));

            const totalLossKW = processedLines.reduce((sum, l) => sum + l.calcQ_tot_kW, 0);

            return (
                <div className="max-w-6xl mx-auto">
                    <ProjectHeader pData={projectData} setPData={setProjectData} title="Dispersione Tubazioni" setAppMode={setAppMode} iconColor="redbrand" />
                    
                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 mb-6 print:shadow-none print:border-none print:p-0">
                        <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-2 print:border-slate-800">
                            <h3 className="text-sm font-bold text-slate-700">Temperature e Fattori Ambientali</h3>
                            <button onClick={() => setShowAdvanced(!showAdvanced)} className="text-xs text-redbrand-600 font-bold hover:underline print-hide">
                                {showAdvanced ? 'Nascondi Avanzate' : 'Mostra Avanzate (α)'}
                            </button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 print:gap-2">
                            {[{l: 'Temp. Fluido Interno (°C)', v: tFluidGlobal, set: setTFluidGlobal, step: "1"}, {l: 'Temp. Ambiente Esterno (°C)', v: tAmbGlobal, set: setTAmbGlobal, step: "1"}].map((f, i) => (
                                <div key={i} className="bg-slate-50 p-3 rounded-lg border border-slate-200 print:bg-transparent print:border-none print:p-0">
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">{f.l}</label>
                                    <input type="number" step={f.step} value={f.v} onChange={e => f.set(e.target.value === '' ? '' : Number(e.target.value))} className="w-full bg-transparent text-lg font-semibold text-slate-800 focus:outline-none print:text-base border-b border-slate-300 print:border-none focus:border-redbrand-500" />
                                </div>
                            ))}
                            {showAdvanced && (
                                <>
                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-200 print-hide">
                                        <label className="block text-[10px] font-bold text-orange-600 uppercase mb-1">Adduttanza Interna (α₁) [W/m²K]</label>
                                        <input type="number" value={alphaInt} onChange={e => setAlphaInt(Number(e.target.value))} className="w-full bg-transparent text-lg font-semibold text-slate-800 focus:outline-none border-b border-orange-300 focus:border-orange-500" />
                                    </div>
                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-200 print-hide">
                                        <label className="block text-[10px] font-bold text-orange-600 uppercase mb-1">Adduttanza Esterna (α₂) [W/m²K]</label>
                                        <input type="number" step="0.1" value={alphaExt} onChange={e => setAlphaExt(Number(e.target.value))} className="w-full bg-transparent text-lg font-semibold text-slate-800 focus:outline-none border-b border-orange-300 focus:border-orange-500" />
                                    </div>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Tratti di Tubazione */}
                    <div className="space-y-4 print-hide">
                        <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-xl shadow-sm">
                            <h2 className="font-semibold text-sm flex items-center"><IconThermometer className="w-4 h-4 mr-2"/> Tratti di Rete Analizzati</h2>
                        </div>
                        {processedLines.length === 0 && <div className="bg-white p-8 rounded-xl border-2 border-dashed border-slate-300 text-center text-slate-500 text-sm">Nessun tratto presente. Clicca su Aggiungi.</div>}
                        
                        {processedLines.map((line) => (
                            <div key={line.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4">
                                
                                {/* Info Linea e Geometria Base */}
                                <div className="flex-1 space-y-3 pr-4 border-r border-slate-100">
                                    <div className="flex items-center justify-between">
                                        <input type="text" value={line.name} onChange={e => updateLine(line.id, 'name', e.target.value)} className="font-bold text-lg text-slate-800 bg-transparent outline-none w-full border-b border-transparent hover:border-slate-300 focus:border-redbrand-500" placeholder="Nome Tratto" />
                                        <div className="flex ml-2">
                                            <button onClick={()=>duplicateLine(line.id)} className="p-1 text-slate-400 hover:bg-slate-100 hover:text-redbrand-600 rounded shrink-0 mr-1" title="Duplica"><IconCopy className="w-4 h-4"/></button>
                                            <button onClick={()=>removeLine(line.id)} className="p-1 text-red-400 hover:bg-red-500 hover:text-white rounded shrink-0" title="Elimina"><IconTrash className="w-4 h-4"/></button>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2 mt-2">
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Materiale Tubo</label>
                                            <select value={line.material} onChange={e => updateLine(line.id, 'material', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50 focus:border-redbrand-500">
                                                {Object.keys(PIPE_CATALOG).map(m=><option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">DN</label>
                                            <select value={line.DN} onChange={e => updateLine(line.id, 'DN', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50">
                                                {Object.keys(PIPE_CATALOG[line.material].specs).map(dn=><option key={dn} value={dn}>{dn}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Classe</label>
                                            <select value={line.PN} onChange={e => updateLine(line.id, 'PN', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50">
                                                {Object.keys(PIPE_CATALOG[line.material].specs[line.DN]||{}).map(pn=><option key={pn} value={pn}>{pn}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-2 rounded border border-slate-200 mt-2">
                                        <div className="flex justify-between text-[10px] text-slate-500">
                                            <span>Ø Int: {PIPE_CATALOG[line.material].specs[line.DN]?.[line.PN]?.toFixed(1)} mm</span>
                                            <span>Ø Est stimato: <strong className="text-slate-700">{line.d_ext_mm?.toFixed(1)} mm</strong></span>
                                        </div>
                                    </div>
                                </div>

                                {/* Isolamento e Lunghezza */}
                                <div className="flex-1 space-y-3 px-2 border-r border-slate-100">
                                    <h4 className="text-[11px] font-bold text-slate-400 uppercase">Isolamento e Posa</h4>
                                    
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipo Isolante</label>
                                        <select value={line.isoType} onChange={e => updateLine(line.id, 'isoType', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded outline-none bg-slate-50 focus:border-redbrand-500">
                                            {INSULATION_CATALOG.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Spessore (mm)</label>
                                            <input type="number" step="1" value={line.isoThick} onChange={e => updateLine(line.id, 'isoThick', e.target.value===''?0 : Number(e.target.value))} className="w-full text-sm font-bold bg-transparent outline-none border-b border-slate-300 focus:border-redbrand-500" disabled={line.isoType==='none'}/>
                                        </div>
                                        <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">λ isolante (W/mK)</label>
                                            <input type="number" step="0.001" value={line.isoLambda} onChange={e => updateLine(line.id, 'isoLambda', e.target.value===''?0 : Number(e.target.value))} className="w-full text-sm font-bold bg-transparent outline-none border-b border-slate-300 focus:border-redbrand-500" disabled={line.isoType!=='custom'}/>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Lunghezza Tratto (m)</label>
                                        <input type="number" step="1" value={line.length} onChange={e => updateLine(line.id, 'length', e.target.value===''?0 : Number(e.target.value))} className="w-full text-lg font-bold text-slate-700 bg-transparent outline-none border-b border-slate-300 focus:border-redbrand-500"/>
                                    </div>
                                </div>

                                {/* Risultato */}
                                <div className="flex-1 space-y-3 pl-4">
                                    <div className="flex justify-between items-center"><h4 className="text-[11px] font-bold text-slate-400 uppercase">Perdite Termiche</h4></div>
                                    
                                    <div className="bg-redbrand-50 p-3 rounded-lg border border-redbrand-200">
                                        <p className="text-[10px] font-bold text-redbrand-600 uppercase mb-1">Dispersione Unitaria (W/m)</p>
                                        <p className="font-mono font-black text-2xl text-redbrand-800">{line.calcQ_Wm.toFixed(2)}</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2 mt-2">
                                        <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase">Totale Tratto (kW)</p>
                                            <p className="font-mono font-bold text-slate-800">{line.calcQ_tot_kW.toFixed(2)}</p>
                                        </div>
                                        <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase">T. Superficie (°C)</p>
                                            <p className="font-mono font-bold text-slate-800">{line.t_surf.toFixed(1)}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        
                        <button onClick={addLine} className="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold shadow-sm flex items-center hover:bg-slate-700"><IconPlus className="w-4 h-4 mr-2"/> Aggiungi Tratto</button>
                    </div>

                    {/* Report Stampa */}
                    <div className="hidden print:block mt-6">
                        <h3 className="text-sm font-bold text-slate-800 mb-2 border-b-2 border-slate-800 pb-1">Tabella Dispersioni per Tratto</h3>
                        <table className="w-full text-left border-collapse text-xs mt-2">
                            <thead>
                                <tr className="border-b border-slate-300">
                                    <th className="py-2">Tratto</th>
                                    <th className="py-2">Tubazione (DN)</th>
                                    <th className="py-2">Isolante (sp. mm)</th>
                                    <th className="py-2 text-right">Lungh. (m)</th>
                                    <th className="py-2 text-right">Q Unit. (W/m)</th>
                                    <th className="py-2 text-right">Q Totale (kW)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {processedLines.map(l => (
                                    <tr key={l.id} className="border-b border-slate-100">
                                        <td className="py-1 font-bold">{l.name}</td>
                                        <td className="py-1">{l.material} DN{l.DN}</td>
                                        <td className="py-1">{INSULATION_CATALOG.find(i=>i.id===l.isoType)?.name} ({l.isoThick}mm)</td>
                                        <td className="py-1 text-right font-mono">{l.length}</td>
                                        <td className="py-1 text-right font-mono">{l.calcQ_Wm.toFixed(1)}</td>
                                        <td className="py-1 text-right font-mono font-bold">{l.calcQ_tot_kW.toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        
                        <div className="mt-8 mx-auto max-w-sm p-4 rounded-xl border-2 border-slate-800 text-center">
                            <p className="text-[10px] font-bold uppercase text-slate-600 mb-1">Totale Dispersione Rete</p>
                            <p className="text-3xl font-mono font-black">{totalLossKW.toFixed(2)} kW</p>
                        </div>
                    </div>

                    <div className="mt-6 bg-slate-800 text-white p-4 rounded-xl flex justify-center items-center print-hide shadow-lg">
                        <div className="text-center">
                            <p className="text-xs text-slate-300 uppercase font-bold tracking-wide">Dispersione Termica Totale dell'Impianto</p>
                            <p className="text-3xl font-mono font-black text-redbrand-400">{totalLossKW.toFixed(2)} <span className="text-sm font-sans font-normal text-white">kW</span></p>
                        </div>
                    </div>

                </div>
            );
        }

        // ==========================================
        // ROOT / ROUTER PRINCIPALE
        // ==========================================
        function App() {
            const [appMode, setAppMode] = useState('dashboard');
            
            const [projectData, setProjectData] = useState({
                client: 'Progetto Impianto',
                author: '',
                date: new Date().toISOString().split('T')[0],
                notes: ''
            });

            if (appMode === 'dashboard') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-100">
                        <div className="max-w-3xl w-full bg-white rounded-3xl shadow-xl p-10 text-center">
                            <img src="Logo.png" alt="Logo" className="h-20 mx-auto mb-6 object-contain" onError={(e) => e.target.style.display='none'} />
                            <h1 className="text-3xl font-black text-slate-800 mb-2">Suite Ingegneria</h1>
                            <p className="text-slate-500 mb-10">Seleziona lo strumento di calcolo per avviare il dimensionamento.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <button onClick={() => setAppMode('idraulico')} className="group flex flex-col items-center p-6 bg-slate-50 border-2 border-slate-200 rounded-2xl hover:border-brand-500 hover:bg-brand-50 transition-all text-left">
                                    <div className="w-16 h-16 bg-blue-100 text-brand-600 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform"><IconWaves /></div>
                                    <h2 className="text-lg font-bold text-slate-800 mb-2 text-center w-full">Profilo Idraulico</h2>
                                    <p className="text-xs text-slate-500 text-center">Perdite di carico, scabrezza e salti piezometrici.</p>
                                </button>

                                <button onClick={() => setAppMode('termico')} className="group flex flex-col items-center p-6 bg-slate-50 border-2 border-slate-200 rounded-2xl hover:border-orange-500 hover:bg-orange-50 transition-all text-left">
                                    <div className="w-16 h-16 bg-orange-100 text-orange-600 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform"><IconFlame /></div>
                                    <h2 className="text-lg font-bold text-slate-800 mb-2 text-center w-full">Carichi Termici</h2>
                                    <p className="text-xs text-slate-500 text-center">Calcolo portate da kWt e ricerca auto-tubazione.</p>
                                </button>

                                <button onClick={() => setAppMode('dispersione')} className="group flex flex-col items-center p-6 bg-slate-50 border-2 border-slate-200 rounded-2xl hover:border-redbrand-500 hover:bg-redbrand-50 transition-all text-left">
                                    <div className="w-16 h-16 bg-redbrand-100 text-redbrand-600 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform"><IconThermometer /></div>
                                    <h2 className="text-lg font-bold text-slate-800 mb-2 text-center w-full">Dispersioni</h2>
                                    <p className="text-xs text-slate-500 text-center">Isolamento tubazioni, scambio termico e temp. superficiale.</p>
                                </button>
                            </div>
                            <div className="mt-8 text-xs text-slate-400">Progettato per reti di distribuzione fluidi.</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-8">
                    {appMode === 'idraulico' && <ToolProfiloIdraulico projectData={projectData} setProjectData={setProjectData} setAppMode={setAppMode} />}
                    {appMode === 'termico' && <ToolCarichiTermici projectData={projectData} setProjectData={setProjectData} setAppMode={setAppMode} />}
                    {appMode === 'dispersione' && <ToolDispersione projectData={projectData} setProjectData={setProjectData} setAppMode={setAppMode} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
