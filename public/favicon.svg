<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <defs>
    <!-- Mask to punch a hole in the center of the gear -->
    <mask id="gear-mask">
      <rect x="0" y="0" width="512" height="512" fill="white" />
      <circle cx="256" cy="256" r="85" fill="black" />
    </mask>

    <!-- The complete gear shape with the center hole -->
    <g id="masked-gear" mask="url(#gear-mask)">
      <!-- 3 intersecting rounded bars forming 6 teeth -->
      <rect x="221" y="16" width="70" height="480" rx="18" fill="white" />
      <rect x="221" y="16" width="70" height="480" rx="18" fill="white" transform="rotate(60, 256, 256)" />
      <rect x="221" y="16" width="70" height="480" rx="18" fill="white" transform="rotate(120, 256, 256)" />
      <!-- Central body of the gear -->
      <circle cx="256" cy="256" r="170" fill="white" />
    </g>

    <!-- Clipping path for the right half -->
    <clipPath id="rightHalf">
      <rect x="256" y="0" width="256" height="512" />
    </clipPath>
  </defs>

  <!-- Left half is Blue (Idraulica / Freddo) -->
  <use href="#masked-gear" fill="#0EA5E9" />

  <!-- Right half is Orange (Termica / Caldo) on top -->
  <use href="#masked-gear" clip-path="url(#rightHalf)" fill="#EA580C" />
</svg>