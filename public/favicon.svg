<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gradient: blue (hydraulic) top-left → orange (thermal) bottom-right -->
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <!-- Gear mask: white = show, black = hide (punches hole in center) -->
    <mask id="gear-mask">
      <rect width="64" height="64" fill="black"/>
      <!-- 6 teeth (pill shapes) rotated every 60° -->
      <rect x="28.5" y="2"  width="7" height="22" rx="3.5" fill="white"/>
      <rect x="28.5" y="2"  width="7" height="22" rx="3.5" fill="white" transform="rotate(60 32 32)"/>
      <rect x="28.5" y="2"  width="7" height="22" rx="3.5" fill="white" transform="rotate(120 32 32)"/>
      <rect x="28.5" y="2"  width="7" height="22" rx="3.5" fill="white" transform="rotate(180 32 32)"/>
      <rect x="28.5" y="2"  width="7" height="22" rx="3.5" fill="white" transform="rotate(240 32 32)"/>
      <rect x="28.5" y="2"  width="7" height="22" rx="3.5" fill="white" transform="rotate(300 32 32)"/>
      <!-- Central disc -->
      <circle cx="32" cy="32" r="16" fill="white"/>
      <!-- Hole in the center -->
      <circle cx="32" cy="32" r="9"  fill="black"/>
    </mask>
  </defs>

  <!-- Gear body: gradient rect clipped by gear mask -->
  <rect width="64" height="64" fill="url(#g)" mask="url(#gear-mask)"/>

  <!-- Sigma (Σ) in the center hole — white, visible on any background -->
  <text
    x="32" y="37.5"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    font-weight="bold"
    fill="white"
    style="paint-order: stroke fill"
    stroke="url(#g)"
    stroke-width="1.5"
  >Σ</text>
</svg>