<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gradient: blue (hydraulic) → orange (thermal) -->
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <!--
      Gear mask logic:
      - White circle (r=21) = gear body
      - White short rects (protruding from edge) = 8 teeth
      - Black circle (r=8) = center hole
    -->
    <mask id="m">
      <rect width="64" height="64" fill="black"/>

      <!-- Central gear body -->
      <circle cx="32" cy="32" r="21" fill="white"/>

      <!-- 8 teeth: short rectangles just beyond the circle edge -->
      <!-- Tooth at 0° (top): rect goes from y=3 to y=13, centered x=28..36 -->
      <!-- Circle edge at top is at y=11. Tooth protrudes from r=21 to r=29 (8px). -->
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(45 32 32)"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(90 32 32)"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(135 32 32)"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(180 32 32)"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(225 32 32)"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(270 32 32)"/>
      <rect x="28" y="3" width="8" height="10" rx="1.5" fill="white" transform="rotate(315 32 32)"/>

      <!-- Center hole -->
      <circle cx="32" cy="32" r="8" fill="black"/>
    </mask>
  </defs>

  <!-- Gear filled with gradient, shaped by mask -->
  <rect width="64" height="64" fill="url(#g)" mask="url(#m)"/>
</svg>